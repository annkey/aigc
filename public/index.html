<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KMAX AI模型播放器</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --bg-soft: #f7faff;
        --text: #141b2d;
        --muted: #667085;
        --line: rgba(15, 23, 42, 0.08);
        --line-strong: rgba(15, 23, 42, 0.12);
        --blue: #0b67ff;
        --cyan: #36d6ff;
        --purple: #6f42ff;
        --shadow: 0 16px 40px rgba(20, 34, 80, 0.08);
        --shadow-strong: 0 28px 70px rgba(20, 34, 80, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(11, 103, 255, 0.08), transparent 28%),
          radial-gradient(circle at bottom right, rgba(54, 214, 255, 0.1), transparent 24%),
          #ffffff;
        color: var(--text);
        overflow-x: hidden;
      }

      .scroll-progress {
        position: fixed;
        inset: 0 auto auto 0;
        width: 100%;
        height: 3px;
        transform-origin: left center;
        transform: scaleX(var(--scroll-progress, 0));
        background: linear-gradient(90deg, #0b67ff 0%, #6f42ff 45%, #36d6ff 100%);
        box-shadow: 0 0 18px rgba(11, 103, 255, 0.28);
        z-index: 60;
      }

      .page-glow {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at var(--glow-x, 50%) var(--glow-y, 18%), rgba(11, 103, 255, 0.12), transparent 22%),
          radial-gradient(circle at 82% 22%, rgba(54, 214, 255, 0.09), transparent 18%);
        transition: background-position 0.15s ease;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
      }

      img {
        display: block;
        max-width: 100%;
      }

      .container {
        width: min(calc(100% - 40px), 1200px);
        margin: 0 auto;
      }

      .gradient-text {
        background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 52%, var(--cyan) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }

      .navbar {
        position: sticky;
        top: 0;
        z-index: 30;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-bottom: 1px solid rgba(15, 23, 42, 0.05);
      }

      .navbar-inner {
        min-height: 88px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-height: 58px;
        flex-wrap: wrap;
      }

      .brand-mark {
        font-size: clamp(1.8rem, 3vw, 2.2rem);
        font-weight: 800;
        letter-spacing: 0;
        line-height: 1;
      }

      .brand-tagline {
        color: #56647e;
        font-size: 0.96rem;
        line-height: 1.4;
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .nav-link,
      .button-primary,
      .button-secondary {
        min-height: 46px;
        padding: 0 22px;
        border-radius: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      }

      .nav-link,
      .button-secondary {
        color: #425066;
        background: #ffffff;
        border: 1px solid var(--line);
      }

      .button-primary {
        color: #ffffff;
        background: linear-gradient(135deg, var(--blue) 0%, var(--cyan) 100%);
        box-shadow: 0 18px 40px rgba(11, 103, 255, 0.22);
        background-size: 180% 180%;
        animation: button-glow 8s ease infinite;
      }

      .nav-link:hover,
      .button-primary:hover,
      .button-secondary:hover {
        transform: translateY(-1px);
      }

      .hero {
        min-height: calc(100vh - 88px);
        display: flex;
        align-items: center;
        padding: 34px 0 32px;
      }

      .hero-grid {
        display: block;
      }

      .hero-copy {
        padding: 18px 0;
        max-width: 860px;
        margin: 0 auto;
        text-align: center;
        animation: hero-rise 0.9s ease both;
        position: relative;
        z-index: 1;
      }

      .hero-title {
        margin: 0;
        font-size: clamp(3.5rem, 6.3vw, 6.2rem);
        line-height: 1.02;
        font-weight: 800;
        background-size: 180% 180%;
        animation: hero-rise 0.9s ease both, title-shift 10s ease infinite;
      }

      .hero-description {
        margin: 24px auto 0;
        max-width: 820px;
        font-size: 1.08rem;
        line-height: 2;
        color: var(--muted);
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 30px;
        justify-content: center;
      }

      .hero-note {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        margin-top: 26px;
        color: #52607a;
        font-size: 0.96rem;
        justify-content: center;
      }

      .hero-note span::before {
        content: "•";
        margin-right: 8px;
        color: var(--blue);
      }

      .scroll-reveal {
        opacity: 0;
        transform: translateY(56px) scale(0.96);
        filter: blur(10px);
        transition:
          opacity 0.75s ease,
          transform 0.75s ease,
          filter 0.75s ease,
          box-shadow 0.28s ease;
        transition-delay: var(--reveal-delay, 0ms);
        will-change: opacity, transform, filter;
      }

      .scroll-reveal.is-visible {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }

      .hero-note span,
      .hero-actions a {
        animation: hero-fade 0.9s ease both;
      }

      .hero-actions a:nth-child(1) {
        animation-delay: 0.18s;
      }

      .hero-actions a:nth-child(2) {
        animation-delay: 0.26s;
      }

      .hero-note span:nth-child(1) {
        animation-delay: 0.34s;
      }

      .hero-note span:nth-child(2) {
        animation-delay: 0.42s;
      }

      .hero-note span:nth-child(3) {
        animation-delay: 0.5s;
      }

      .hero-note span:nth-child(4) {
        animation-delay: 0.58s;
      }

      .hero-panel-card h3,
      .section-head h2,
      .stat-copy h2,
      .footer-mark strong {
        margin: 0;
      }

      .section {
        padding: 100px 0;
      }

      .section.alt {
        background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
      }

      .section-head {
        text-align: center;
        margin-bottom: 48px;
      }

      .section-head h2 {
        font-size: clamp(2.2rem, 4.1vw, 3.4rem);
      }

      .section-head p {
        max-width: 760px;
        margin: 16px auto 0;
        line-height: 1.85;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .feature-grid,
      .scene-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
      }

      .feature-card,
      .scene-card {
        position: relative;
        overflow: hidden;
        padding: 28px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(15, 23, 42, 0.06);
        box-shadow: var(--shadow);
        transform-style: preserve-3d;
        transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      }

      .feature-card:hover,
      .scene-card:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-strong);
        border-color: rgba(11, 103, 255, 0.16);
      }

      .feature-card::after,
      .scene-card::after,
      .stats-row::after,
      .cta-panel::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255, 255, 255, 0.7), transparent 24%);
        opacity: 0;
        transition: opacity 0.22s ease;
        pointer-events: none;
      }

      .feature-card:hover::after,
      .scene-card:hover::after,
      .stats-row:hover::after,
      .cta-panel:hover::after {
        opacity: 1;
      }

      .feature-icon,
      .scene-icon {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, rgba(11, 103, 255, 0.12), rgba(54, 214, 255, 0.18));
        color: var(--blue);
        font-weight: 700;
        font-size: 1.15rem;
      }

      .feature-card h3,
      .scene-card h3 {
        margin: 22px 0 0;
        font-size: 1.18rem;
      }

      .feature-card p,
      .scene-card p {
        margin: 14px 0 0;
        line-height: 1.8;
        color: var(--muted);
      }

      .stat-layout {
        display: grid;
        grid-template-columns: minmax(0, 0.92fr) minmax(320px, 1.08fr);
        gap: 28px;
        align-items: center;
      }

      .stat-copy h2 {
        font-size: clamp(2.2rem, 4vw, 3.2rem);
        line-height: 1.08;
      }

      .stat-copy p {
        margin: 18px 0 0;
        font-size: 1.05rem;
        line-height: 1.9;
        color: var(--muted);
      }

      .stat-callout {
        margin-top: 28px;
        padding: 22px 24px;
        border-radius: 24px;
      }

      .stat-callout strong {
        display: block;
        font-size: 1.05rem;
      }

      .stat-callout span {
        display: block;
        margin-top: 10px;
        line-height: 1.75;
        color: var(--muted);
      }

      .stats-card {
        padding: 24px;
        border-radius: 30px;
      }

      .stats-list {
        display: grid;
        gap: 14px;
      }

      .stats-row {
        position: relative;
        overflow: hidden;
        min-height: 72px;
        padding: 0 18px;
        border-radius: 18px;
        background: rgba(247, 250, 255, 0.94);
        border: 1px solid rgba(15, 23, 42, 0.05);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      }

      .stats-row:hover {
        transform: translateY(-3px);
        box-shadow: 0 18px 36px rgba(20, 34, 80, 0.08);
        border-color: rgba(11, 103, 255, 0.12);
      }

      .stats-row span {
        color: #55637b;
      }

      .stats-row strong {
        text-align: right;
      }

      .cta-section {
        padding: 0 0 110px;
      }

      .cta-panel {
        position: relative;
        overflow: hidden;
        padding: 40px;
        border-radius: 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        background:
          linear-gradient(140deg, rgba(11, 103, 255, 0.96), rgba(54, 214, 255, 0.88)),
          #0b67ff;
        color: #ffffff;
        box-shadow: var(--shadow-strong);
      }

      .cta-panel::before {
        content: "";
        position: absolute;
        inset: -40% auto -40% -20%;
        width: 42%;
        transform: rotate(12deg);
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
        animation: sheen 7s ease-in-out infinite;
        pointer-events: none;
      }

      .cta-copy h2 {
        margin: 0;
        font-size: clamp(2rem, 3.6vw, 3rem);
      }

      .cta-copy p {
        margin: 16px 0 0;
        max-width: 720px;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.88);
      }

      .footer {
        padding: 30px 0 44px;
        border-top: 1px solid rgba(15, 23, 42, 0.05);
      }

      .footer-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .footer-brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .footer-brand img {
        width: auto;
        height: 34px;
        max-width: 180px;
        object-fit: contain;
        object-position: left center;
      }

      .footer-mark {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .footer-mark span,
      .footer-copy {
        color: var(--muted);
      }

      @keyframes hero-rise {
        from {
          opacity: 0;
          transform: translateY(32px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes hero-fade {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes button-glow {
        0% {
          background-position: 0% 50%;
        }

        50% {
          background-position: 100% 50%;
        }

        100% {
          background-position: 0% 50%;
        }
      }

      @keyframes title-shift {
        0% {
          background-position: 0% 50%;
        }

        50% {
          background-position: 100% 50%;
        }

        100% {
          background-position: 0% 50%;
        }
      }

      @keyframes sheen {
        0% {
          transform: translateX(-120%) rotate(12deg);
        }

        40%,
        100% {
          transform: translateX(280%) rotate(12deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }

        .button-primary,
        .hero-copy,
        .hero-title,
        .hero-note span,
        .hero-actions a,
        .scroll-reveal {
          animation: none !important;
          transition: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .cta-panel::before,
        .feature-card::after,
        .scene-card::after,
        .stats-row::after,
        .cta-panel::after {
          display: none !important;
        }
      }

      @media (max-width: 1080px) {
        .stat-layout {
          grid-template-columns: 1fr;
        }

        .feature-grid,
        .scene-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .container {
          width: min(calc(100% - 24px), 1200px);
        }

        .navbar-inner,
        .footer-inner,
        .cta-panel {
          flex-direction: column;
          align-items: flex-start;
        }

        .nav-actions,
        .hero-actions {
          width: 100%;
        }

        .nav-link,
        .button-primary,
        .button-secondary {
          width: 100%;
        }

        .feature-grid,
        .scene-grid {
          grid-template-columns: 1fr;
        }

        .brand {
          align-items: flex-start;
          flex-direction: column;
          gap: 6px;
        }

        .hero {
          min-height: auto;
          padding: 24px 0 28px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
