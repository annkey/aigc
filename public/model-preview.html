<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地 3D 模型预览</title>
    <link rel="stylesheet" href="/model-preview.css" />
  </head>
  <body>
    <div class="preview-page">
      <main class="viewer-shell" id="viewer-shell">
        <div id="viewer" class="viewer"></div>

        <div class="hud top-left">
          <section class="hud-card metrics-card" aria-label="模型参数">
            <div class="metrics-grid">
              <div class="metric-item">
                <span>文件数</span>
                <strong id="file-count">0</strong>
              </div>
              <div class="metric-item">
                <span>格式</span>
                <strong id="format-stat">-</strong>
              </div>
              <div id="mesh-metric" class="metric-item hidden">
                <span>网格数</span>
                <strong id="mesh-stat">-</strong>
              </div>
              <div class="metric-item">
                <span>子结构数</span>
                <strong id="part-stat">-</strong>
              </div>
              <div class="metric-item">
                <span>三角面</span>
                <strong id="triangle-stat">-</strong>
              </div>
              <div class="metric-item">
                <span>顶点数</span>
                <strong id="vertex-stat">-</strong>
              </div>
              <div class="metric-item">
                <span>动画数</span>
                <strong id="animation-stat">0</strong>
              </div>
              <div class="metric-item">
                <span>文件大小</span>
                <strong id="file-size-stat">-</strong>
              </div>
              <div class="metric-item">
                <span>尺寸</span>
                <strong id="size-stat">-</strong>
              </div>
            </div>
          </section>
        </div>

        <div class="hud top-right">
          <div class="toolbar toolbar-ghost" aria-label="模型生成与列表">
            <label class="action-btn action-btn-secondary action-btn-file" for="model-files">本地模型播放</label>
            <button id="open-generator-modal" class="action-btn" type="button">AI生成模型</button>
            <button id="open-model-list-modal" class="action-btn action-btn-secondary" type="button">3D模型列表</button>
          </div>
        </div>

        <div class="hud bottom-right">
          <div class="toolbar" aria-label="预览操作">
            <label class="tool-btn tool-btn-upload" for="model-files" data-label="选择模型" title="选择模型">
              <span aria-hidden="true">&#10548;</span>
            </label>
            <button id="toggle-fullscreen" class="tool-btn" type="button" data-label="全屏查看" title="全屏查看">
              <span aria-hidden="true">&#x26F6;</span>
            </button>
            <button id="toggle-stereo-3d" class="tool-btn" type="button" data-label="裸眼 3D" title="裸眼 3D">
              <span aria-hidden="true">&#9723;</span>
            </button>
            <button id="reset-camera" class="tool-btn" type="button" data-label="重置视角" title="重置视角">
              <span aria-hidden="true">&#9678;</span>
            </button>
            <button id="toggle-autorotate" class="tool-btn" type="button" data-label="自动旋转" title="自动旋转">
              <span aria-hidden="true">&#8635;</span>
            </button>
            <button id="toggle-wireframe" class="tool-btn" type="button" data-label="线框模式" title="线框模式">
              <span aria-hidden="true">#</span>
            </button>
            <button id="toggle-grid" class="tool-btn" type="button" data-label="地面网格" title="地面网格">
              <span aria-hidden="true">&#9642;</span>
            </button>
            <button id="toggle-explode" class="tool-btn" type="button" data-label="爆炸视图" title="爆炸视图">
              <span aria-hidden="true">&#10531;</span>
            </button>
            <label id="explode-strength-wrap" class="tool-range hidden" for="explode-strength" title="爆炸强度">
              <span>爆炸</span>
              <input id="explode-strength" type="range" min="0" max="100" step="1" value="65" />
            </label>
            <select id="submodel-select" class="tool-select tool-select-wide hidden" title="子模型文件" aria-label="子模型文件">
              <option value="">主模型文件</option>
            </select>
            <select id="theme-select" class="tool-select" title="背景主题" aria-label="背景主题">
              <option value="warm">暖光工作台</option>
              <option value="studio" selected>明亮摄影棚</option>
              <option value="dark">深色展示台</option>
            </select>
            <button id="export-image" class="tool-btn" type="button" data-label="导出 PNG" title="导出 PNG">
              <span aria-hidden="true">&#8681;</span>
            </button>
          </div>
        </div>

        <div id="task-progress-overlay" class="task-progress-overlay hidden" aria-live="polite">
          <div class="task-progress-card">
            <div class="task-progress-head">
              <span class="task-progress-eyebrow">模型生成中</span>
              <button id="task-progress-close" class="task-progress-close" type="button" aria-label="关闭生成进度弹窗" title="关闭">×</button>
            </div>
            <strong id="task-progress-title">等待创建任务...</strong>
            <p id="task-progress-meta">提交后会在这里显示生成进度。</p>
            <div class="task-progress-track">
              <div id="task-progress-fill" class="task-progress-fill"></div>
            </div>
            <div class="task-progress-footer">
              <span id="task-progress-percent">0%</span>
              <button id="task-progress-open-list" class="text-btn" type="button">查看模型列表</button>
            </div>
          </div>
        </div>

        <div id="model-playback-loading" class="model-playback-loading hidden" aria-live="polite">
          <div class="model-playback-loading-card">
            <strong id="model-playback-loading-title">正在加载模型...</strong>
            <p id="model-playback-loading-meta">加载完成前会锁定其他模型切换。</p>
          </div>
        </div>

        <div id="generator-modal" class="modal-shell hidden" role="dialog" aria-modal="true" aria-labelledby="generator-modal-title">
          <div class="modal-backdrop" data-close-modal="generator-modal"></div>
          <section class="modal-card">
            <div class="modal-head">
              <div>
                <h2 id="generator-modal-title">生成 3D 模型</h2>
              </div>
              <button class="modal-close" type="button" data-close-modal="generator-modal" aria-label="关闭">×</button>
            </div>

            <form id="generator-form" class="modal-form">
              <label class="form-field">
                <span>生成方式</span>
                <select id="generator-mode" name="mode">
                  <option value="text">文字生成</option>
                  <option value="image">图片生成</option>
                </select>
              </label>

              <div id="generator-config-summary" class="form-summary hidden" aria-hidden="true"></div>

              <label class="form-field prompt-field" id="generator-prompt-field">
                <span>提示词</span>
                <textarea id="generator-prompt" name="prompt" rows="4" placeholder="例如：一朵高细节的白粉色百合花，摄影棚灯光，写实材质"></textarea>
              </label>

              <label class="form-field hidden" id="generator-image-field">
                <span>参考图片</span>
                <input id="generator-image" name="image" type="file" accept="image/png,image/jpeg,image/webp" />
              </label>

              <div class="form-grid">
                <label class="form-field">
                  <span>纹理质量</span>
                  <select id="generator-texture-quality" name="textureQuality"></select>
                </label>

                <label class="form-field">
                  <span>几何质量</span>
                  <select id="generator-geometry-quality" name="geometryQuality"></select>
                </label>
              </div>

              <div id="generator-form-note" class="form-note hidden" aria-hidden="true"></div>

              <div class="modal-actions">
                <button class="secondary-btn" type="button" data-close-modal="generator-modal">取消</button>
                <button id="generator-submit" class="primary-btn" type="submit">开始生成</button>
              </div>
            </form>
          </section>
        </div>

        <div id="model-list-modal" class="modal-shell hidden" role="dialog" aria-modal="true" aria-labelledby="model-list-modal-title">
          <div class="modal-backdrop" data-close-modal="model-list-modal"></div>
          <section class="modal-card modal-card-wide">
            <div class="modal-head">
              <div>
                <h2 id="model-list-modal-title">3D 模型列表</h2>
                <p>查看历史生成记录与当前进度。</p>
              </div>
              <button class="modal-close" type="button" data-close-modal="model-list-modal" aria-label="关闭">×</button>
            </div>

            <div id="model-list-empty" class="empty-state">还没有生成记录，先创建一个 3D 模型吧。</div>
            <div id="model-list-items" class="model-list"></div>
          </section>
        </div>

        <div class="hidden-ui" aria-hidden="true">
          <span id="status-text">等待上传</span>
          <input
            id="model-files"
            type="file"
            multiple
            accept=".glb,.gltf,.fbx,.obj,.stl,.bin,.mtl,.jpg,.jpeg,.png,.webp"
          />
          <select id="entry-file" disabled>
            <option value="">请先选择模型文件</option>
          </select>
          <input id="light-range" type="range" min="0.6" max="2.6" step="0.1" value="1.4" />
          <span id="light-value">1.4x</span>
          <button id="load-model" type="button">加载预览</button>
          <span id="stereo-device-badge">设备未连接</span>
          <p id="stereo-status-detail">当前为普通 3D 预览模式。</p>
          <ul id="file-list"><li>暂未选择文件</li></ul>
          <ul id="recent-list"><li>还没有历史记录</li></ul>
          <span id="size-stat-hidden">-</span>
          <span id="model-name">尚未加载模型</span>
          <span id="model-meta">上传本地模型文件后，即可在浏览器中预览。</span>
        </div>
      </main>
    </div>

    <script>
      window.Module = {
        loaded: false,
        onRuntimeInitialized() {
          window.Module.loaded = true;
          if (typeof window.Module._setScreenParams === "function") {
            window.Module._setScreenParams(0.544, 0.306, 1);
          }
          if (typeof window.Module._setCameraParams === "function") {
            window.Module._setCameraParams(0.1, 1000);
          }
          window.dispatchEvent(new CustomEvent("kmax-module-ready"));
        }
      };
    </script>
    <script src="/vendor/kmax/kmax-stereo-bind.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "/vendor/three/build/three.module.js",
          "three/addons/": "/vendor/three/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/model-preview.js"></script>
  </body>
</html>
